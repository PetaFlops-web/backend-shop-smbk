paths:
  /products:
    get:
      consumes:
      - application/json
      description: Mencari dan menampilkan daftar produk untuk suatu toko
      parameters:
      - description: Store ID
        in: query
        name: store_id
        required: true
        type: string
      - description: Keyword nama produk
        in: query
        name: name
        type: string
      - default: 1
        description: Nomor Halaman
        in: query
        name: page
        type: integer
      - default: 10
        description: Ukuran Halaman
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_PetaFlops-web_backend-shop-smbk_internal_shared_response.WebResponse-array_github_com_PetaFlops-web_backend-shop-smbk_internal_modules_product_src_model_ProductResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_PetaFlops-web_backend-shop-smbk_internal_shared_response.ApiErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_PetaFlops-web_backend-shop-smbk_internal_shared_response.ApiErrorResponse'
      security:
      - BearerAuth: []
      summary: Menampilkan daftar produk dengan pagination
      tags:
      - Product
    post:
      consumes:
      - application/json
      description: Membuat entri produk baru untuk toko tertentu
      parameters:
      - description: Data Produk
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_PetaFlops-web_backend-shop-smbk_internal_modules_product_src_model.CreateProductRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_PetaFlops-web_backend-shop-smbk_internal_shared_response.WebResponse-github_com_PetaFlops-web_backend-shop-smbk_internal_modules_product_src_model_ProductResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_PetaFlops-web_backend-shop-smbk_internal_shared_response.ApiErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_PetaFlops-web_backend-shop-smbk_internal_shared_response.ApiErrorResponse'
      security:
      - BearerAuth: []
      summary: Menambahkan data produk baru
      tags:
      - Product
  /products/{id}:
    delete:
      consumes:
      - application/json
      description: Menghapus data produk berdasarkan ID dan Store ID
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: string
      - description: Store ID
        in: query
        name: store_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_PetaFlops-web_backend-shop-smbk_internal_shared_response.WebResponse-any'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_PetaFlops-web_backend-shop-smbk_internal_shared_response.ApiErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_PetaFlops-web_backend-shop-smbk_internal_shared_response.ApiErrorResponse'
      security:
      - BearerAuth: []
      summary: Menghapus produk
      tags:
      - Product
    get:
      consumes:
      - application/json
      description: Mengambil data produk berdasarkan ID dan Store ID
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: string
      - description: Store ID
        in: query
        name: store_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_PetaFlops-web_backend-shop-smbk_internal_shared_response.WebResponse-github_com_PetaFlops-web_backend-shop-smbk_internal_modules_product_src_model_ProductResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_PetaFlops-web_backend-shop-smbk_internal_shared_response.ApiErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_PetaFlops-web_backend-shop-smbk_internal_shared_response.ApiErrorResponse'
      security:
      - BearerAuth: []
      summary: Menampilkan detail satu produk
      tags:
      - Product
    put:
      consumes:
      - application/json
      description: Mengubah detail produk berdasarkan ID
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: string
      - description: Data Produk
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_PetaFlops-web_backend-shop-smbk_internal_modules_product_src_model.UpdateProductRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_PetaFlops-web_backend-shop-smbk_internal_shared_response.WebResponse-github_com_PetaFlops-web_backend-shop-smbk_internal_modules_product_src_model_ProductResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_PetaFlops-web_backend-shop-smbk_internal_shared_response.ApiErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_PetaFlops-web_backend-shop-smbk_internal_shared_response.ApiErrorResponse'
      security:
      - BearerAuth: []
      summary: Mengubah data produk yang sudah ada
      tags:
      - Product
  /users:
    post:
      consumes:
      - application/json
      description: Creates a new user with username and password
      parameters:
      - description: Register Request
